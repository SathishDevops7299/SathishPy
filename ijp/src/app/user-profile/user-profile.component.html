<html>



<head>
  <link rel="stylesheet" href="./user-profile.component.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">



</head>



<body>
  <div class="topsection">
    <div class="section3">
    <img src="../../assets/AriLogo.png" style="height:61px ;background-size: 9em;
    background-repeat: no-repeat;margin-top: -8px; ;"></div>
    <div class="section1">
    <label  style="color: #F69659;font-size: 20px; font-family: Verdana, Geneva, Tahoma, sans-serif">
      Welcome {{name}}!
    </label>
  </div>
  <div class="section2">
    <button (click)="logout()" style="font-size: 18px; background-color:white;outline: none;border: none;color: #F69659;
           font-family: Verdana, Geneva, Tahoma, sans-serif;cursor: pointer;
           ">Logout</button>
  </div>
  </div>
  <div class="alignment">
  <div class="LeftPanel">
    <h1
      style="margin:1px 0 0 40px ;font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;">
      MY <br>
      <label style="color: #F69659;">DASHBOARD</label>
    </h1>
    <div class="LeftPanelOptions">
  
      <br><label
        style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; cursor: pointer;"
        routerLink="/home" routerLinkActive="activeTab">HOME</label><br><br>
  
      <br><label
        style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; cursor: pointer;"
        routerLink="/userprofile" routerLinkActive="activeTab">MY PROFILE</label><br><br>
  
      <br><label
        style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; cursor: pointer;"
        routerLink="/myinterviews" routerLinkActive="activeTab"> MY INTERVIEWS</label><br><br>
  
      <br><label
        style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; cursor: pointer;"
        routerLink="/user-history" routerLinkActive="activeTab">HISTORY</label><br>
  
    </div>
    
  </div>

 <div class="BodySection">
    
      <label style="margin-left: 250px;font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
font-weight: 500;">
       MY RESUME *</label> &nbsp;&nbsp;&nbsp;&nbsp;
     <input type="text" disabled placeholder="Upload Resume Here" name="myresume"
        style=" background-color: white; height: 25px; width: 200px;" required >
      &nbsp;&nbsp;&nbsp;&nbsp;
     <input type="file" name="file" (change)="selectFile($event)"
              accept="application/pdf,application/vnd.ms-excel"
        onchange="document.getElementsByName('myresume')[0].value=' '+document.getElementsByName('file')[0].value"
         />
      <br><br><br>
      <label style="margin-left: 264px;font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
font-weight: 500;">
       MY SKILLS *</label> &nbsp;&nbsp;&nbsp;&nbsp;
    <input type="text" placeholder="Enter skills separeted by comma" name="userDto" (change)="selectText($event)" style="height: 25px; width: 200px;" required="true">
      <br><br><br><br>
      <button (click)="upload()"
        style="font-family:Verdana, Geneva, Tahoma, sans-serif;color: white;
        margin-left: 307px; border-radius: 1.5em; background-color: #F69659;outline: none;border: none;width: 100px;height: 30px; cursor: pointer;"
        >SAVE</button>
&nbsp;&nbsp;
       <button (click)="viewResume()" style="font-family: Verdana, Geneva, Tahoma, sans-serif;height: 30px;width: 170px;background-color: #F69659;
          color: white;border-radius: 2em;outline: none;border: none; cursor: pointer;">EXISTING PROFILE</button>
    </div>  
    </div> 
    <span>
      <input type="checkbox" id="check">
      <label class="chat-btn" for="check" (click)="chatClicked()">
        <i class="fa fa-commenting-o comment"></i> <i class="fa fa-close close"></i> </label>
      <div class="wrapper" id="wrapper">
        <div class="header"> <label
            style="margin-left: 80px;font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; font-weight: 600;">
            ARi BOT ASSISTANT</label>
        </div>
        <iframe
          src='https://webchat.botframework.com/embed/ARI_Chat_Bot?s=OrJObAnesi4.UrqlRm2tyYVzdYFb7Msf3tP0jWajFvO1wU98eDeAc2o'
          style='min-width: 300px; width: 100%; min-height: 500px'></iframe>
      </div>
    </span>     
</body>
</html>
