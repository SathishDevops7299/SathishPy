<html>

<head>
<link rel="stylesheet"  href="./user-history.component.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

</head>

<body>
  <div class="topsection">
    <div class="section3">
    <img src="../../assets/AriLogo.png" style="height:61px ;background-size: 9em;
    background-repeat: no-repeat;margin-top: -8px; ;"></div>
    <div class="section1">
    <label  style="color: #F69659;font-size: 20px; font-family: Verdana, Geneva, Tahoma, sans-serif">
      Welcome {{name}}!
    </label>
  </div>
  <div class="section2">
    <button (click)="logout()" style="font-size: 18px; background-color:white;outline: none;border: none;color: #F69659;
           font-family: Verdana, Geneva, Tahoma, sans-serif;cursor: pointer;
           ">Logout</button>
  </div>
  </div>
<div class="LeftPanel">
    <h1 style="margin-left: 40px;font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;">MY <br>
      <label style="color: #F69659;">DASHBOARD</label></h1>
    <div class="LeftPanelOptions">

    <br><label style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; cursor: pointer;" routerLink="/home" routerLinkActive="activeTab">HOME</label><br><br>
    <br><label style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; cursor: pointer;" routerLink="/userprofile" routerLinkActive="activeTab">MY  PROFILE</label><br><br>
    <br><label style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; cursor: pointer;" routerLink="/myinterviews" routerLinkActive="activeTab" >MY INTERVIEWS</label><br><br>
    <br><label style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;cursor: pointer;" routerLink="/user-history" routerLinkActive="activeTab" >HISTORY</label><br>       
    </div>

<span>
  <input type="checkbox" id="check">
  <label class="chat-btn" for="check">
    <i class="fa fa-commenting-o comment" (click)="chatClicked()"></i> <i class="fa fa-close close"
      (click)="chatClosed()"></i> </label>
  <div class="wrapper" id="wrapper">
    <div class="header"> <label
        style="margin-left: 80px;font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; font-weight: 600;">
        ARi BOT ASSISTANT</label>
    </div>
    <iframe
      src='https://webchat.botframework.com/embed/ARI_Chat_Bot?s=OrJObAnesi4.UrqlRm2tyYVzdYFb7Msf3tP0jWajFvO1wU98eDeAc2o'
      style='min-width: 300px; width: 100%; min-height: 500px'></iframe>
  </div>
</span>
</div>

<div class="JobSearch"><br>
  &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; <label style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;font-weight: 500;
  ">SEARCH</label><br><br>
   <div class="space">
   <input type="search" placeholder="Type Something Here..." [(ngModel)]="filterTerm"><i
     style="font-size:15px;margin-left:1em; font-family: Verdana, Geneva, Tahoma, sans-serif"></i>
   </div>
 </div>

 <div class="BodySection"><br>
  &nbsp;&nbsp;&nbsp;&nbsp;
  <label style="margin-left: 1em; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; font-weight:600;font-size: 15px;
">Hello {{name}} ,</label>
  &nbsp;<label style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; font-weight:600;
">Your activity...
  </label>
  <br>
  <label style="font-weight:normal; margin-left: 11px;margin-top: 7px;"></label>
  <div id="all" class="tabcontent">
    <div class="names">
      <table id="table1">
        <tr style="background-color:#f5f5f5;">
          <th ></th>
          <th >Date Of Application</th>
        <th>Job Name</th>
        <th>Status</th>
        </tr><br>
        <tr *ngFor="
        let jobs of  getJobs | filter : filterTerm
            | paginate
              : {
                  itemsPerPage:pageSize,
                  currentPage: page,
                  totalItems: count
                };paginate:config,
          let i = index
        ">
          <td [width]="10"><i style="font-size:24px ;color: #F69659;" class="fa">&#xf1da;</i></td>
          <td [width]="256">{{jobs.job.jobDate}}</td>
        <td [width]="300">{{jobs.job.jobName}}</td>
        <td [width]="300">Applied</td>
        </tr>
      </table>

    </div>
  </div>
  <div class="d-flex justify-content-center">
    <pagination-controls previousLabel="Prev" nextLabel="Next" (pageChange)="onTableDataChange($event)">
    </pagination-controls>
    <div class="mt-3">
      <label>Select no of entries : </label>
      <select (change)="handlePageSizeChange($event)">
        <option *ngFor="let size of pageSizes" [ngValue]="size">
          {{ size }}
        </option>
      </select>
    </div>
  </div>
</div>

</body>
</html>
