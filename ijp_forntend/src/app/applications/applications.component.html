<html>

<head>
  <link rel="stylesheet" href="./applications.component.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

</head>

<body>
  <div class="topsection">
    <div class="section3">
    <img src="../../assets/AriLogo.png" style="height:61px ;background-size: 9em;
    background-repeat: no-repeat;margin-top: -8px; ;"></div>
    <div class="section1">
    <label  style="color: #F69659;font-size: 20px; font-family: Verdana, Geneva, Tahoma, sans-serif">
      Welcome {{name}}!
    </label>
  </div>
  <div class="section2">
    <button (click)="logout()" style="font-size: 18px; background-color:white;outline: none;border: none;color: #F69659;
           font-family: Verdana, Geneva, Tahoma, sans-serif;cursor: pointer;
           ">Logout</button>
  </div>
  </div>
  <div class="LeftPanel">
    <h1
      style="margin-left: 40px;font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;">
      MY <br>
      <label style="color: #F69659;">DASHBOARD</label>
    </h1>
    <div class="LeftPanelOptions">

      <br>
      <ng-container *ngIf="role==1">
        <label style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; cursor: pointer;"
          routerLink="/admin" routerLinkActive="activeTab">HOME</label>
        </ng-container>
  
        <ng-container *ngIf="role==2">
          <label style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; cursor: pointer;"
            routerLink="/hiringManager" routerLinkActive="activeTab">HOME</label>
          </ng-container>
      <br><br>
      <br><label
        style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; cursor: pointer;"
        routerLink="/applications" routerLinkActive="activeTab">APPLICATIONS</label><br><br>
      <br><label
        style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; cursor: pointer;"
        routerLink="/history" routerLinkActive="activeTab">HISTORY</label><br><br><br>
        <ng-container *ngIf="role==1">
          <label
          style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; cursor: pointer;"
          routerLink="/role" routerLinkActive="activeTab">ROLE</label><br><br>
          <br><label
          style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;cursor: pointer;"
          routerLink="/department" routerLinkActive="activeTab">DEPARTMENT</label>
        </ng-container>  

    </div>

  </div>
  <span>
    <input type="checkbox" id="check">
    <label class="chat-btn" for="check">
      <i class="fa fa-commenting-o comment" (click)="chatClicked()"></i> <i class="fa fa-close close"
        (click)="chatClosed()"></i> </label>
    <div class="wrapper" id="wrapper">
      <div class="header"> <label
          style="margin-left: 80px;font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; font-weight: 600;">
          ARi BOT ASSISTANT</label>
      </div>
      <iframe
        src='https://webchat.botframework.com/embed/ARI_Chat_Bot?s=OrJObAnesi4.UrqlRm2tyYVzdYFb7Msf3tP0jWajFvO1wU98eDeAc2o'
        style='min-width: 300px; width: 100%; min-height: 500px'></iframe>
    </div>
  </span>
  <div class="JobSearch"><br>
    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; <label style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;font-weight: 500;
    ">SEARCH</label><br><br>
     <div class="space">
     <input type="search" placeholder="Type Something Here..." [(ngModel)]="filterTerm"><i
       style="font-size:15px;margin-left:1em; font-family: Verdana, Geneva, Tahoma, sans-serif"></i>
     </div>
   </div>
  <div class="BodySection"><br>
    <label style="font-weight:normal; margin-left: 11px;margin-top: 7px;
   font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;font-weight: 500;
   ">APPLICATIONS </label>
    <input
      style="background: #F5F5F5;border: 1px solid #000000;box-sizing: border-box; border-radius: 19.5px;width:200px; margin-left: 650px;height:35px;"
      type="button" value="RUN RESUME RANKER">
    <br><br>
    <input
      style="float:inline-start;background: #FFFFFF;border: 1px solid #D1CCCC;width: 110px;height: 35px;  margin-left: 30px; padding: 1px 2px;"
      type="text" placeholder="Select A Job ID" [(ngModel)]="filterTerm">
    &nbsp;&nbsp;&nbsp;
    <!-- <button   style="float:inline-start;background: #FFFFFF;border: 1px solid #D1CCCC;width: 40px;height: 42px; margin-left: -1px;" ><i class="fa fa-caret-down" aria-hidden="true"></i></button>&nbsp;&nbsp;&nbsp; -->
    <button style="margin-top: 5px;border-radius: 50%;"><i class="fa fa-eye"></i></button> &nbsp;&nbsp;&nbsp;&nbsp;

    <div id="all" class="tabcontent">

      <table id="myTable">
        <br>
        <tr class="header" style="background-color:#f5f5f5;color:black;">
          <th>JOB ID</th>
          <th>JOB TITLE</th>
          <th>APPLICANTS</th>
          <th>% MATCH</th>
          <th></th>
          <th>NEXT STEPS</th>
        </tr>
        <tr *ngFor="
        let jobs of  displayJobs |filter:filterTerm
            | paginate
              : {
                  itemsPerPage:pageSize,
                  currentPage: page,
                  totalItems: count
                };paginate:config,
          let i = index
        ">
          <td>{{jobs.job.jobId}}</td>
          <td>{{jobs.job.jobName}}</td>
          <td>{{jobs.user.name}} &nbsp;<br><button style="margin-top: 5px;border-radius: 50%;"><i
                class="fa fa-group"></i></button></td>
          <td>-</td>
          <td>
            <button (click)="viewResume(jobs.user.userId)" style="font-family: Verdana, Geneva, Tahoma, sans-serif;height: 30px;width: 100px;background-color: #F69659;
    color: white;border-radius: 2em;outline: none;border: none; cursor: pointer;">VIEW</button>

          </td>
          <td><button
              onclick="window.open('https://teams.microsoft.com/_?culture=en-in&country=IN&lm=deeplink&lmsrc=homePageWeb&cmpid=WebSignIn')"
              style="font-family: Verdana, Geneva, Tahoma, sans-serif;height: 30px;width: 100px;background-color: #F69659;
    color: white;border-radius: 2em;outline: none;border: none; cursor: pointer;">INTERVIEW</button></td>
          <td><button style="margin-top: 5px;border-radius: 50%;"><i class="fa fa-file"></i></button></td>
          &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
          <td *ngIf="jobs.selectStatus===selected"><input
              style=" color: #373737;background: #F5F5F5;border: 1px solid #373737; cursor: pointer;" type="button"
              value="SELECTED"> </td>
          &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
          <td *ngIf="jobs.selectStatus===notSelected"><input
            style=" color: #373737;background: #F5F5F5;border: 1px solid #373737; cursor: pointer;" type="button"
            (click)="showSelectAlert(jobs.job.jobId,jobs.user.userId)" value="SELECT"></td>
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
          <td><input
              style=" color: #373737;background: #F5F5F5;border: 1px solid #373737;cursor: pointer;" type="button"
              (click)="showRejectAlert(jobs.job.jobId,jobs.user.userId)" value="REJECT"></td>
        </tr><br>
      </table>
    </div>
    <div class="d-flex justify-content-center">
      <pagination-controls previousLabel="Prev" nextLabel="Next" (pageChange)="onTableDataChange($event)">
      </pagination-controls>
      <div class="mt-3">
        <label>Select no of entries : </label>
        <select (change)="handlePageSizeChange($event)">
          <option *ngFor="let size of pageSizes" [ngValue]="size">
            {{ size }}
          </option>
        </select>
      </div>
    </div>
  </div>

</body>

</html>
