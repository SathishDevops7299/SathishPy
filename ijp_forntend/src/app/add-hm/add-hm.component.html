<html>

<head>
  <link rel="stylesheet" href="./add-hm.component.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <script src='https://kit.fontawesome.com/a076d05399.js' crossorigin='anonymous'></script>
</head>

<body>
  
  <div class="topsection">
    <div class="section3">
    <img src="../../assets/AriLogo.png" style="height:61px ;background-size: 9em;
    background-repeat: no-repeat;margin-top: -8px; ;"></div>
    <div class="section1">
    <label  style="color: #F69659;font-size: 20px; font-family: Verdana, Geneva, Tahoma, sans-serif">
      Welcome {{name}}!
    </label>
  </div>
  <div class="section2">
    <button (click)="logout()" style="font-size: 18px; background-color:white;outline: none;border: none;color: #F69659;
           font-family: Verdana, Geneva, Tahoma, sans-serif;cursor: pointer;
           ">Logout</button>
  </div>
  </div>
    
  <div class="LeftPanel">
    <h1
      style="margin-left: 40px;font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;">
      MY <br>
      <label style="color: #F69659;">DASHBOARD</label>
    </h1>
    <div class="LeftPanelOptions">
     <br><label
        style=" font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; cursor: pointer; "
        routerLink="/admin" routerLinkActive="activeTab">HOME</label><br><br>
      <br><label
        style=" font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;cursor: pointer;  "
        routerLink="/applications" routerLinkActive="activeTab">APPLICATIONS</label><br><br>
      <br><label
        style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; cursor: pointer;"
        routerLink="/admin-history" routerLinkActive="activeTab">HISTORY</label>

    </div>
  </div>

  <div class="BodySection">
   
    <form [formGroup]="AddHM" (ngSubmit)="onSubmit()" style="text-align: left;padding-left:5em;" autocomplete="off"><br><br><br>
      <label style=" margin-left: 12em;font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;">
        Name *</label>&nbsp;&nbsp;&nbsp;&nbsp;<input type="text" name="username"  formControlName='username'  style="height: 30px; width: 200px; margin-left: 20px;" required="true">
          <br><br><br>
      <label style=" margin-left: 12em;font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;">
      EMAIL *</label>&nbsp;&nbsp;&nbsp;<input type="email" name="email"  formControlName='email'  style="height: 30px; width: 200px; margin-left: 20px;" required="true">
        <br><br><br>
         <label style="margin-left: 12.5em;font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;">
            ROLE *</label> 
            <select id="tenure" formControlName= 'roles' style="margin-left:2.5em;width:212px;height:35px;" required>
              <option selected disabled>Select Role</option>
              <option value="hiring_manager">Hiring Manager</option>
             
            </select>
           <br><br><br>
                  
              <!-- <label style=" margin-left: 12em;font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;">
           Field *</label>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<input type="jobfield" name="jobfield"  formControlName='jobfield'  style="height: 30px; width: 200px; margin-left: 20px;" required="true">
                <br><br><br> -->
          
      <input type="reset" style=" font-family: Verdana, Geneva, Tahoma, sans-serif; height: 30px;width: 100px;margin-left:15em;background-color: #F69659;
       color: white;border-radius: 2em;outline: none;border: none; cursor: pointer;" value="CANCEL">

        <button type="submit" style="font-family: Verdana, Geneva, Tahoma, sans-serif; margin-left:10em;height: 30px;width: 100px;background-color: #F69659;
        color: white;border-radius: 2em;outline: none;border: none; cursor: pointer; ">ADD</button>

    <span>
      <input type="checkbox" id="check">
      <label class="chat-btn" for="check">
        <i class="fa fa-commenting-o comment" (click)="chatClicked()"></i> <i class="fa fa-close close"
          (click)="chatClosed()"></i> </label>
      <div class="wrapper" id="wrapper">
        <div class="header"> <label
            style="margin-left: 80px;font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; font-weight: 600;">
            ARi BOT ASSISTANT</label>
        </div>
        <iframe
          src='https://webchat.botframework.com/embed/ARI_Chat_Bot?s=OrJObAnesi4.UrqlRm2tyYVzdYFb7Msf3tP0jWajFvO1wU98eDeAc2o'
          style='min-width: 300px; width: 100%; min-height: 500px'></iframe>
      </div>
    </span>
    
    </form>
    
  </div>
